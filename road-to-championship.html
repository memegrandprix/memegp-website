<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Road to Championship 2027 — MEME GP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#06070b;
    --panel:#0c0e15;
    --line:#1b1e29;
    --line-bright:#2a2e3d;
    --ink:#f2f5fa;
    --muted:#8c95a6;
    --dim:#5a6172;
    --gold:#ffcc00;
    /* milestone heat */
    --m1:#00ff88;
    --m2:#00b3ff;
    --m3:#b14cff;
    --m4:#ffaa00;
    --m5:#ff3355;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:
      radial-gradient(1200px 500px at 50% -10%, rgba(255,204,0,.06), transparent 60%),
      var(--bg);
    color:var(--ink);
    font-family:'JetBrains Mono',monospace;
    padding:40px 20px 60px;
    -webkit-font-smoothing:antialiased;
  }
  .road{
    max-width:1180px;margin:0 auto;
    background:linear-gradient(180deg,#0a0c12 0%,#080910 100%);
    border:1px solid var(--line);
    border-radius:16px;
    padding:34px 34px 38px;
    position:relative;overflow:hidden;
  }
  /* faint circuit grid texture */
  .road::before{
    content:'';position:absolute;inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
    background-size:46px 46px;
    pointer-events:none;
  }
  .road > *{position:relative;z-index:1}

  /* ---------- header ---------- */
  .rc-eyebrow{
    font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);
    display:flex;align-items:center;gap:8px;margin-bottom:10px;
  }
  .rc-head{
    display:flex;justify-content:space-between;align-items:flex-end;
    flex-wrap:wrap;gap:18px;margin-bottom:30px;
  }
  .rc-title{
    font-family:'Orbitron',sans-serif;font-weight:900;
    font-size:clamp(26px,4.4vw,46px);line-height:.95;letter-spacing:.5px;
    text-transform:uppercase;
  }
  .rc-title .accent{
    color:var(--gold);
    text-shadow:0 0 26px rgba(255,204,0,.45);
  }
  .rc-mc{ text-align:right; min-width:200px;}
  .rc-mc-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
  .rc-mc-value{
    font-family:'Orbitron',sans-serif;font-weight:800;
    font-size:clamp(34px,6vw,58px);line-height:1;letter-spacing:1px;
    text-shadow:0 0 30px rgba(255,255,255,.18);
  }
  .rc-live{
    font-size:9px;letter-spacing:1.5px;text-transform:uppercase;
    color:var(--m1);display:inline-flex;align-items:center;gap:6px;justify-content:flex-end;
  }
  .rc-live .dot{
    width:7px;height:7px;border-radius:50%;background:var(--m1);
    box-shadow:0 0 9px var(--m1);animation:pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

  /* ---------- track ---------- */
  .track-wrap{position:relative;margin:6px 0 40px;padding:38px 0 8px;}
  .track{
    position:relative;height:14px;border-radius:8px;
    background:repeating-linear-gradient(90deg,#13151d 0 22px,#0f111a 22px 24px);
    border:1px solid var(--line-bright);
    box-shadow:inset 0 1px 4px rgba(0,0,0,.6);
  }
  /* glowing progress fill */
  .track-fill{
    position:absolute;top:0;left:0;height:100%;width:0;border-radius:8px;
    background:linear-gradient(90deg,var(--m1),var(--m2) 30%,var(--m3) 55%,var(--m4) 80%,var(--m5));
    box-shadow:0 0 18px rgba(0,255,136,.4);
    transition:width 1.1s cubic-bezier(.22,.7,.25,1);
  }
  /* start grid + finish */
  .track-grid-start,.track-finish{
    position:absolute;top:-8px;height:30px;width:14px;
    background-image:
      linear-gradient(45deg,#fff 25%,transparent 25%,transparent 75%,#fff 75%),
      linear-gradient(45deg,#fff 25%,#222 25%,#222 75%,#fff 75%);
    background-size:7px 7px;background-position:0 0,3.5px 3.5px;
    opacity:.85;border-radius:2px;
  }
  .track-grid-start{left:-2px}
  .track-finish{right:-2px}
  /* milestone gates on the track */
  .gate{
    position:absolute;top:50%;transform:translate(-50%,-50%);
    width:3px;height:26px;border-radius:2px;background:var(--dim);
  }
  .gate.reached{background:var(--g);box-shadow:0 0 12px var(--g);}
  .gate-label{
    position:absolute;top:-30px;left:50%;transform:translateX(-50%);
    font-size:9px;letter-spacing:1px;color:var(--muted);white-space:nowrap;
  }
  /* position indicator — glowing playhead at the leading edge of the fill */
  .marker{
    position:absolute;top:50%;left:0;
    transform:translate(-50%,-50%);
    width:7px;height:28px;border-radius:5px;
    background:var(--m1);
    box-shadow:0 0 16px var(--m1), 0 0 6px var(--m1);
    transition:left 1.1s cubic-bezier(.22,.7,.25,1), background .4s ease, box-shadow .4s ease;
    z-index:3;
  }
  .marker::before{
    content:'';position:absolute;inset:0;border-radius:5px;
    background:linear-gradient(rgba(255,255,255,.75),transparent 60%);
    opacity:.55;
  }

  /* ---------- segment readout ---------- */
  .seg-line{
    display:flex;justify-content:space-between;align-items:center;
    font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);
    margin:-26px 2px 30px;
  }
  .seg-line strong{color:var(--ink)}
  .seg-line .next strong{color:var(--gold)}

  /* ---------- tiles ---------- */
  .tiles{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;}
  .tile{
    position:relative;padding:20px 16px 18px;text-align:center;
    background:linear-gradient(180deg,#0e1018,#0a0b12);
    border:1px solid var(--line-bright);
    /* beveled / cut-corner frame */
    clip-path:polygon(14px 0, 100% 0, 100% calc(100% - 14px), calc(100% - 14px) 100%, 0 100%, 0 14px);
    transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease;
  }
  /* accent driven by --c set inline per tile */
  .tile .tnum{
    font-family:'Orbitron',sans-serif;font-weight:900;font-size:30px;letter-spacing:1px;
    color:var(--dim);transition:color .25s,text-shadow .25s;
  }
  .tile .tmc{
    font-family:'Orbitron',sans-serif;font-weight:700;font-size:15px;margin-top:2px;
    color:var(--muted);transition:color .25s;
  }
  .tile .tunlock{
    font-size:10.5px;line-height:1.45;color:var(--dim);margin-top:9px;
    transition:color .25s;
  }
  /* upcoming = dim (default above). reached = full color + glow. */
  .tile.reached{
    border-color:var(--c);
    box-shadow:0 0 0 1px var(--c) inset, 0 0 22px -6px var(--c);
    background:linear-gradient(180deg, color-mix(in srgb, var(--c) 12%, #0a0b12), #0a0b12);
  }
  .tile.reached .tnum{color:var(--c);text-shadow:0 0 16px var(--c);}
  .tile.reached .tmc{color:var(--ink);}
  .tile.reached .tunlock{color:var(--muted);}
  /* next (active) = pulsing accent outline */
  .tile.active{
    border-color:var(--c);
    box-shadow:0 0 0 1px var(--c) inset, 0 0 26px -4px var(--c);
    animation:tilePulse 1.9s ease-in-out infinite;
  }
  .tile.active .tnum{color:var(--c);text-shadow:0 0 18px var(--c);}
  .tile.active .tmc{color:var(--ink);}
  .tile.active .tunlock{color:var(--muted);}
  @keyframes tilePulse{
    0%,100%{box-shadow:0 0 0 1px var(--c) inset, 0 0 18px -8px var(--c);}
    50%{box-shadow:0 0 0 1px var(--c) inset, 0 0 34px 0px var(--c);}
  }
  /* status badge */
  .tbadge{
    margin-top:11px;font-size:8.5px;letter-spacing:1.2px;text-transform:uppercase;
    display:inline-block;padding:4px 8px;border-radius:3px;
  }
  .tile.reached .tbadge{
    background:color-mix(in srgb, var(--c) 18%, transparent);
    color:var(--c);border:1px solid color-mix(in srgb, var(--c) 45%, transparent);
  }
  .tile.active .tbadge{
    background:color-mix(in srgb, var(--c) 14%, transparent);
    color:var(--c);border:1px solid color-mix(in srgb, var(--c) 40%, transparent);
  }
  .tile.upcoming .tbadge{display:none;}
  /* checkered flag corner on a completed sector */
  .tile.reached .flag{
    position:absolute;top:0;right:0;width:24px;height:24px;
    background-image:
      linear-gradient(45deg,var(--c) 25%,transparent 25%,transparent 75%,var(--c) 75%),
      linear-gradient(45deg,var(--c) 25%,#0a0b12 25%,#0a0b12 75%,var(--c) 75%);
    background-size:8px 8px;background-position:0 0,4px 4px;
    opacity:.6;clip-path:polygon(100% 0,0 0,100% 100%);
  }
  .flag{display:none}

  @media (max-width:820px){
    .tiles{grid-template-columns:repeat(2,1fr);}
    .road{padding:24px 18px 28px;}
  }
  @media (max-width:480px){
    .tiles{grid-template-columns:1fr;}
    .rc-head{flex-direction:column;align-items:flex-start}
    .rc-mc{text-align:left}
    .rc-live{justify-content:flex-start}
  }
</style>
</head>
<body>

<section class="road">
  <div class="rc-eyebrow">▸ THE ROAD TO CHAMPIONSHIP · 2027</div>

  <div class="rc-head">
    <div class="rc-title">FROM THE GRID<br>TO <span class="accent">CHAMPIONSHIP</span></div>
    <div class="rc-mc">
      <div class="rc-mc-label">Current $MEMEGP Market Cap</div>
      <div class="rc-mc-value" id="mcValue">—</div>
      <div class="rc-live"><span class="dot" id="liveDot"></span><span id="liveStatus">CONNECTING…</span></div>
    </div>
  </div>

  <div class="track-wrap">
    <div class="track">
      <div class="track-fill" id="trackFill"></div>
      <div class="track-grid-start"></div>
      <div class="track-finish"></div>
      <div id="gates"></div>
      <div class="marker" id="marker"></div>
    </div>
  </div>

  <div class="seg-line">
    <span>FROM <strong id="segFrom">$0</strong></span>
    <span id="segStatus">RACE UNDERWAY</span>
    <span class="next">NEXT · <strong id="segNext">$250K</strong></span>
  </div>

  <div class="tiles" id="tiles"></div>
</section>

<script>
(function(){
  const MEMEGP_CA   = '4QMjp47neoMT3FTnKbLR9rCUcSTx4MZy1knuKFAVpump';
  const GECKO_TOKEN = `https://api.geckoterminal.com/api/v2/networks/solana/tokens/${MEMEGP_CA}`;
  const GECKO_POOL  = `https://api.geckoterminal.com/api/v2/networks/solana/pools/9UsTfqXEE6h5ucvCrHh85b83HDWkrKrmrJHmRdg99mJQ`;
  const FIXED_SUPPLY = 1e9;
  const REFRESH_MS = 60000;

  const MILESTONES = [
    { id:1, mc:250000,   label:'$250K', unlock:'Season 2 fully funded — grid locked, races live',  c:'var(--m1)' },
    { id:2, mc:500000,   label:'$500K', unlock:'Runway secured through the Season 2 finale',        c:'var(--m2)' },
    { id:3, mc:1000000,  label:'$1M',   unlock:'Academy feeder league + S3 grid-slot auctions',     c:'var(--m3)' },
    { id:4, mc:2500000,  label:'$2.5M', unlock:'3D race-broadcast engine in development',            c:'var(--m4)' },
    { id:5, mc:5000000,  label:'$5M',   unlock:'Championship-grade 2027 — 3D broadcasts, full S3',   c:'var(--m5)' },
  ];

  function fmtMc(n){
    if(n==null||isNaN(n)) return '—';
    if(n>=1e9) return '$'+(n/1e9).toFixed(2)+'B';
    if(n>=1e6) return '$'+(n/1e6).toFixed(2)+'M';
    if(n>=1e3) return '$'+(n/1e3).toFixed(1)+'K';
    return '$'+n.toFixed(0);
  }

  function progress(mc){
    let reached=0;
    for(const m of MILESTONES){ if(mc>=m.mc) reached++; }
    if(reached>=MILESTONES.length){
      return {reached, next:null, from:MILESTONES[MILESTONES.length-1].mc, fillPct:100};
    }
    const next=MILESTONES[reached];
    const from=reached===0?0:MILESTONES[reached-1].mc;
    const fillPct=Math.max(0,Math.min(100,((mc-from)/(next.mc-from))*100));
    return {reached, next, from, fillPct};
  }

  // car/track position: each sector = 1/5 of the track; advance by completed
  // sectors + fractional fill of the current one. A small floor keeps the car
  // just off the start line so a fresh race still reads as "underway".
  function trackPos(p){
    const segs = MILESTONES.length;
    const frac = (p.reached + (p.next ? p.fillPct/100 : 0)) / segs;
    return Math.max(2.5, Math.min(100, frac*100));
  }

  function buildGates(){
    const gates=document.getElementById('gates');
    gates.innerHTML = MILESTONES.map((m,i)=>{
      const left=((i+1)/MILESTONES.length)*100;
      return `<div class="gate" data-i="${i}" style="left:${left}%;--g:${m.c}">
                <span class="gate-label">M${m.id}</span>
              </div>`;
    }).join('');
  }

  function renderTiles(p){
    const mount=document.getElementById('tiles');
    mount.innerHTML = MILESTONES.map((m,i)=>{
      let state='upcoming', badge='LOCKED';
      if(i < p.reached){ state='reached'; badge='SECTOR '+m.id+' COMPLETE'; }
      else if(i === p.reached){ state='active'; badge='IN PROGRESS · '+p.fillPct.toFixed(1)+'%'; }
      return `
        <div class="tile ${state}" style="--c:${m.c}">
          <span class="flag"></span>
          <div class="tnum">M${m.id}</div>
          <div class="tmc">${m.label}</div>
          <div class="tunlock">${m.unlock}</div>
          <div class="tbadge">${badge}</div>
        </div>`;
    }).join('');
  }

  function render(mc, live){
    const p = progress(mc);

    document.getElementById('mcValue').textContent = fmtMc(mc);
    const pos = trackPos(p);
    document.getElementById('trackFill').style.width = pos+'%';

    // position indicator + active-sector colour
    const activeColor = p.next ? MILESTONES[p.reached].c : 'var(--m5)';
    const marker = document.getElementById('marker');
    marker.style.left = pos+'%';
    marker.style.background = activeColor;
    marker.style.boxShadow = `0 0 16px ${activeColor}, 0 0 6px ${activeColor}`;

    // gates reached
    document.querySelectorAll('.gate').forEach((g,i)=>{
      g.classList.toggle('reached', i < p.reached);
    });

    document.getElementById('segFrom').textContent = fmtMc(p.from);
    document.getElementById('segNext').textContent = p.next ? p.next.label : 'CHAMPION';
    document.getElementById('segStatus').textContent = p.next
      ? ('SECTOR '+(p.reached+1)+' · RACE UNDERWAY')
      : 'CHAMPIONSHIP TIER';

    const status=document.getElementById('liveStatus');
    const dot=document.getElementById('liveDot');
    status.textContent = live ? 'LIVE · ON-CHAIN' : 'UPDATING…';
    dot.style.background = 'var(--m1)';

    renderTiles(p);
  }

  function setState(msg, color){
    document.getElementById('liveStatus').textContent = msg;
    document.getElementById('liveDot').style.background = color;
  }

  function mcFromAttrs(a){
    if(!a) return null;
    let mc=parseFloat(a.market_cap_usd);
    if(!mc||isNaN(mc)) mc=parseFloat(a.fdv_usd);
    if(!mc||isNaN(mc)){
      const price=parseFloat(a.price_usd!=null?a.price_usd:a.base_token_price_usd);
      const supply=parseFloat(a.normalized_total_supply)||FIXED_SUPPLY;
      if(price>0) mc=price*supply;
    }
    return (mc>0&&!isNaN(mc))?mc:null;
  }
  async function fetchJson(url){
    const r=await fetch(url,{cache:'no-store'});
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r.json();
  }
  async function fetchMC(){
    try{
      let mc=null;
      try{ const t=await fetchJson(GECKO_TOKEN); mc=mcFromAttrs(t&&t.data&&t.data.attributes); }catch(e){}
      if(mc==null){ try{ const p=await fetchJson(GECKO_POOL); mc=mcFromAttrs(p&&p.data&&p.data.attributes); }catch(e){} }
      if(mc==null){ setState('AWAITING DATA','var(--gold)'); return; }
      render(mc, true);
    }catch(err){
      console.warn('fetch failed', err);
      setState('FETCH FAILED','var(--m5)');
    }
  }

  // first paint with structure + placeholder, then live
  buildGates();
  render(0, false);
  fetchMC();
  setInterval(fetchMC, REFRESH_MS);
})();
</script>
</body>
</html>
