name: Daily Grid Index Snapshot

# Runs daily at 07:30 UTC — 30 minutes AFTER daily-snapshot.yml (07:00 UTC)
# so that data/history.json has today's fresh team MCAPs to compute from.
#
# Can also be triggered manually via "Run workflow" in GitHub Actions UI.

on:
  schedule:
    - cron: "30 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run build-index-snapshot.py
        run: python scripts/build-index-snapshot.py

      - name: Commit and push changes (if any)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/index-snapshots.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(index): daily grid index snapshot $(date -u +'%Y-%m-%d')"
            # Pull with rebase in case someone pushed to main while we were running.
            # Retry the push up to 3 times to handle concurrent pushes gracefully.
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "Push attempt $i failed, retrying..."
              sleep 2
            done
          fi
